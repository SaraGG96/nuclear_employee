plugins {
    id 'application'
    id 'jacoco'
    id 'java'
}

repositories {
    mavenCentral()
}

dependencies {
    testImplementation 'junit:junit:4.13.2'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

application {
    mainClass = 'com.springfield.App'
}

jar {
    manifest {
        attributes 'Main-Class': application.mainClass
    }
}
